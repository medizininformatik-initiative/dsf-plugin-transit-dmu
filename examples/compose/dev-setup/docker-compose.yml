include:
  - path: db/db.yml
    project_directory: db
  - compose/fhir-server-dic.yml
  - compose/fhir-server-dms.yml
  - compose/fhir-store-dms.yml

services:

  proxy:
    image: nginx:1.23
    restart: "no"
    ports:
      - 127.0.0.1:443:443
    secrets:
      - localhost.chain.crt
      - localhost.key.plain
      - issuing_ca.crt
      - ca_chain.crt
    volumes:
      - type: bind
        source: ./proxy/conf.d
        target: /etc/nginx/conf.d
        read_only: true
      - type: bind
        source: ./proxy/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
    networks:
      dic-fhir-frontend:
        ipv4_address: 192.20.0.66
      dic-bpe-frontend:
        ipv4_address: 192.20.0.114
      hrp-fhir-frontend:
        ipv4_address: 192.20.0.82
      hrp-bpe-frontend:
        ipv4_address: 192.20.0.130
      dms-fhir-frontend:
        ipv4_address: 192.20.0.98
      dms-bpe-frontend:
        ipv4_address: 192.20.0.146
      internet:
        aliases:
          - dms
          - dic
          - hrp
    environment:
      TZ: Europe/Berlin

  dms-fhir:
    image: ghcr.io/datasharingframework/fhir:2.1.0
    restart: "no"
    ports:
      - 127.0.0.1:5002:5002
      - 9595:8080
    secrets:
      - db_liquibase.password
      - db_dms_fhir_user.password
      - db_dms_fhir_user_permanent_delete.password
      - ca_chain.crt
      - app_dms_client_certificate.pem
      - app_dms_client_certificate_private_key.pem
      - app_dms_client_certificate_private_key.pem.password
    volumes:
      - type: bind
        source: ./dms/fhir/conf/bundle.xml
        target: /opt/fhir/conf/bundle.xml
      - type: bind
        source: ./dms/fhir/log
        target: /opt/fhir/log
    environment:
      TZ: Europe/Berlin
      EXTRA_JVM_ARGS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5002
      JETTY_CLIENT_TRUSTSTORE_PEM: /run/secrets/ca_chain.crt
      DEV_DSF_FHIR_DB_LIQUIBASE_PASSWORD_FILE: /run/secrets/db_liquibase.password
      DEV_DSF_FHIR_DB_USER_PASSWORD_FILE: /run/secrets/db_dms_fhir_user.password
      DEV_DSF_FHIR_DB_USER_PERMANENT_DELETE_PASSWORD_FILE: /run/secrets/db_dms_fhir_user_permanent_delete.password
      DEV_DSF_FHIR_CLIENT_TRUST_SERVER_CERTIFICATE_CAS: /run/secrets/ca_chain.crt
      DEV_DSF_FHIR_CLIENT_CERTIFICATE: /run/secrets/app_dms_client_certificate.pem
      DEV_DSF_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY: /run/secrets/app_dms_client_certificate_private_key.pem
      DEV_DSF_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY_PASSWORD_FILE: /run/secrets/app_dms_client_certificate_private_key.pem.password
      DEV_DSF_FHIR_DB_URL: jdbc:postgresql://db/dms_fhir
      DEV_DSF_FHIR_DB_USER_GROUP: dms_fhir_users
      DEV_DSF_FHIR_DB_USER_USERNAME: dms_fhir_server_user
      DEV_DSF_FHIR_DB_USER_PERMANENT_DELETE_GROUP: dms_fhir_permanent_delete_users
      DEV_DSF_FHIR_DB_USER_PERMANENT_DELETE_USERNAME: dms_fhir_server_permanent_delete_user
      DEV_DSF_FHIR_SERVER_BASE_URL: https://dms/fhir
      DEV_DSF_FHIR_SERVER_ORGANIZATION_IDENTIFIER_VALUE: dms.dsf.test
      DEV_DSF_FHIR_SERVER_ORGANIZATION_THUMBPRINT: ${DMS_BUNDLE_USER_THUMBPRINT}
      DEV_DSF_SERVER_AUTH_TRUST_CLIENT_CERTIFICATE_CAS: /run/secrets/ca_chain.crt
      DEV_DSF_FHIR_SERVER_ROLECONFIG: |
        - webbrowser_test_user:
            thumbprint: ${WEBBROWSER_TEST_USER_THUMBPRINT}
            token-role: admin
            dsf-role:
              - CREATE
              - READ
              - UPDATE
              - DELETE
              - SEARCH
              - HISTORY
              - PERMANENT_DELETE
            practitioner-role:
              - http://dsf.dev/fhir/CodeSystem/practitioner-role|DSF_ADMIN

    networks:
      dms-fhir-frontend:
        ipv4_address: 192.20.0.99
      dms-fhir-backend:
      internet:
    depends_on:
      - db
      - proxy

  dms-bpe:
    image: ghcr.io/datasharingframework/bpe:2.1.0
    restart: "no"
    ports:
      - 127.0.0.1:5005:5005
    secrets:
      - db_liquibase.password
      - db_dms_bpe_user.password
      - db_dms_bpe_user_engine.password
      - ca_chain.crt
      - app_dms_client_certificate.pem
      - app_dms_client_certificate_private_key.pem
      - app_dms_client_certificate_private_key.pem.password
      - dms_public_key.pem
      - dms_private_key.pem
    volumes:
      - type: bind
        source: ./dms/bpe/plugin
        target: /opt/bpe/plugin
        read_only: true
      - type: bind
        source: ./dms/bpe/process
        target: /opt/bpe/process
        read_only: true
      - type: bind
        source: ./dms/bpe/log
        target: /opt/bpe/log
      - type: bind
        source: ./dms/bpe/last_event
        target: /opt/bpe/last_event
      - type: bind
        source: ./data
        target: /data
    environment:
      TZ: Europe/Berlin
      EXTRA_JVM_ARGS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      DEV_DSF_BPE_DB_LIQUIBASE_PASSWORD_FILE: /run/secrets/db_liquibase.password
      DEV_DSF_BPE_DB_USER_PASSWORD_FILE: /run/secrets/db_dms_bpe_user.password
      DEV_DSF_BPE_DB_USER_ENGINE_PASSWORD_FILE: /run/secrets/db_dms_bpe_user_engine.password
      DEV_DSF_BPE_FHIR_CLIENT_TRUST_SERVER_CERTIFICATE_CAS: /run/secrets/ca_chain.crt
      DEV_DSF_BPE_FHIR_CLIENT_CERTIFICATE: /run/secrets/app_dms_client_certificate.pem
      DEV_DSF_BPE_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY: /run/secrets/app_dms_client_certificate_private_key.pem
      DEV_DSF_BPE_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY_PASSWORD_FILE: /run/secrets/app_dms_client_certificate_private_key.pem.password
      DEV_DSF_BPE_DB_URL: jdbc:postgresql://db/dms_bpe
      DEV_DSF_BPE_DB_USER_GROUP: dms_bpe_users
      DEV_DSF_BPE_DB_USER_USERNAME: dms_bpe_server_user
      DEV_DSF_BPE_DB_USER_ENGINE_GROUP: dms_engine_users
      DEV_DSF_BPE_DB_USER_ENGINE_USERNAME: dms_engine_server_user
      DEV_DSF_BPE_FHIR_SERVER_BASE_URL: https://dms/fhir
      DEV_DSF_BPE_SERVER_BASE_URL: https://dms/bpe
      DEV_DSF_BPE_SERVER_UI_THEME: dev
      DEV_DSF_SERVER_AUTH_TRUST_CLIENT_CERTIFICATE_CAS: /run/secrets/ca_chain.crt
      DEV_DSF_BPE_PROCESS_EXCLUDED: medizininformatik-initiativede_coordinateDataSharing|1.1,medizininformatik-initiativede_executeDataSharing|1.1
      DE_MEDIZININFORMATIK_INITIATIVE_DATA_SHARING_DMS_FHIR_SERVER_BASE_URL: 'http://dmsfhir:8080/fhir'
      DE_MEDIZININFORMATIK_INITIATIVE_DMS_PUBLIC_KEY: /run/secrets/dms_public_key.pem
      DE_MEDIZININFORMATIK_INITIATIVE_DMS_PRIVATE_KEY: /run/secrets/dms_private_key.pem
      EU_DATAMANAGEMENTUNIT_TRANSIT_PROJECTFILE_FHIR_SERVER_BASE_URL: "http://projectfile:8080/fhir"
      EU_DATAMANAGEMENTUNIT_TRANSIT_GPAS_URL: "http://gpas:8080/gpas"
      EU_DATAMANAGEMENTUNIT_TRANSIT_FILESTORAGE_PATH: "/data"
      EU_DATAMANAGEMENTUNIT_TRANSIT_FILESTORAGE_URL: "http://filestorage/dl/"
      DEV_DSF_BPE_FHIR_CLIENT_CONNECTIONS_CONFIG: |
        projectfile:
          base-url: http://projectfile:8080/fhir
      DEV_DSF_BPE_SERVER_ROLECONFIG: |
        - webbrowser_test_user:
            thumbprint: ${WEBBROWSER_TEST_USER_THUMBPRINT}
            token-role: admin
            dsf-role:
              - ADMIN

    networks:
      dms-bpe-frontend:
        ipv4_address: 192.20.0.147
      dms-bpe-backend:
      internet:
    depends_on:
      - db
      - dms-fhir
      - gpas

