    #      - ./data/postgres:/var/lib/postgresql/data
    networks:
      dms-bpe-backend:

  gpas:
    image: mosaicgreifswald/gpas:2024.3.0
    container_name: gpas
    ports:
      #      - "8787:8787"
      - "8080:8080"
      - "9990:9990"
    environment:
      WF_ADMIN_PASS: admin
      WF_HEALTHCHECK_URLS: http://localhost:8080/
    depends_on:
      - mysql
    volumes:
      - ./gpas/logs:/entrypoint-wildfly-logs
      - ./gpas/addins:/entrypoint-wildfly-addins
    networks:
      dms-bpe-backend:
      
  postgresdmsakte:
    container_name: "postgresdmsakte"
    image: "postgres:18"
    environment:
      POSTGRES_DB: "projects"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      TZ: Europe/Berlin
    networks:
      dms-bpe-backend:

  projectfile:
    container_name: "projectfile"
    image: ghcr.io/medizininformatik-initiative/dmu-fhir-store:latest
    ports:
      - "9181:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker-it
      JDK_JAVA_OPTIONS: "-XX:MaxRAMPercentage=70.0 -XX:MinRAMPercentage=70.0 -XX:InitialRAMPercentage=70.0"
      hapi.fhir.subscription.resthook_enabled: "true"
      hapi.fhir.allowed_bundle_types: "COLLECTION,DOCUMENT,MESSAGE,TRANSACTION"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db/projectfile
      SPRING_DATASOURCE_USERNAME: liquibase_user
      SPRING_DATASOURCE_PASSWORD: NKb2D7ZCxgmhrddh4KNgCrBr49mSsqWUnQAQHgGPkYZ2k7W9VQCFevuGRFYeZg9p
    depends_on:
      - db
    networks:
      dms-bpe-backend:

  filestorage:
    container_name: "filestorage"
    image: ghcr.io/medizininformatik-initiative/dmu-file-storage:latest
    ports:
      - "80:80"
    volumes:
      - ./data:/usr/share/nginx/html
    networks:
      dms-bpe-backend:


